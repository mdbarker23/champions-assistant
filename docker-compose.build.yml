services:
  champions-assistant:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: local
    image: champions-assistant:local
    container_name: champions-assistant
    restart: unless-stopped
    ports:
      - "${CHAMPIONS_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
