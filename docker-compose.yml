services:
  champions-assistant:
    image: ghcr.io/mdbarker23/champions-assistant:${CHAMPIONS_TAG:-latest}
    container_name: champions-assistant
    restart: unless-stopped
    ports:
      - "${CHAMPIONS_PORT:-8080}:80"
    pull_policy: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
